<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KL Concert Run - 21 to 22 June 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260502-scroll-tabs">
</head>
<body>
<div class="shell">
  <header>
    <div class="topbar">
      <div class="brand"><span class="mark" id="brandMark"></span> <span id="brandName"></span></div>
      <a class="ticket-link" id="eventLink" target="_blank" rel="noopener"></a>
    </div>
    <div class="hero">
      <div>
        <div class="eyebrow" id="eyebrow"></div>
        <h1 id="heroTitle"></h1>
        <p class="hero-copy" id="heroCopy"></p>
      </div>
      <div class="stat-grid" id="stats"></div>
    </div>
  </header>

  <div class="marquee" aria-hidden="true">
    <div class="marquee-track" id="marqueeTrack"></div>
  </div>

  <nav class="tab-nav" aria-label="Trip sections">
    <div class="tab-inner">
      <button class="tab-btn active" id="nav-day-1" data-section="day-1" aria-current="true">Day 1</button>
      <button class="tab-btn" id="nav-day-2" data-section="day-2" aria-current="false">Day 2</button>
      <button class="tab-btn" id="nav-packing" data-section="packing" aria-current="false">Packing List</button>
    </div>
  </nav>

  <main class="content-flow">
    <section id="section-day-1" class="scroll-section" aria-labelledby="nav-day-1">
      <div class="legend-wrap">
        <div class="legend" id="legend"></div>
      </div>
      <div id="dayOneContent"></div>
    </section>

    <section id="section-day-2" class="scroll-section" aria-labelledby="nav-day-2">
      <div id="dayTwoContent"></div>
    </section>

    <section id="section-packing" class="scroll-section packing-section" aria-labelledby="nav-packing">
      <div class="packing-head">
        <div>
          <div class="progress-wrap"><div class="progress-bar" id="packBar"></div></div>
        </div>
        <div style="display:flex; gap:10px; align-items:center; justify-content:space-between;">
          <div class="pack-label" id="packLabel">0 of 0 packed</div>
          <button class="pack-reset" id="packReset">Reset</button>
        </div>
      </div>
      <div class="pack-grid" id="packingSections"></div>
    </section>
  </main>

  <footer id="footerText"></footer>
</div>

<script src="data.js?v=20260502-scroll-tabs"></script>
<script src="script.js?v=20260502-scroll-tabs"></script>
</body>
</html>
